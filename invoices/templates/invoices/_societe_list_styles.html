<style>
.companies-page {
    max-width: 1500px;
    margin: 0 auto;
}

.companies-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
    margin-bottom: 1.75rem;
}

.companies-eyebrow {
    margin-bottom: .4rem;
    color: var(--accent);
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
}

.companies-header h1 {
    margin: 0;
    font-size: clamp(1.65rem, 3vw, 2.15rem);
    line-height: 1.2;
    letter-spacing: -.035em;
}

.companies-header p,
.companies-card-header p,
.company-form-heading p {
    margin: .5rem 0 0;
    color: var(--text-secondary);
    line-height: 1.55;
}

.companies-back-link {
    flex: 0 0 auto;
    margin: 0;
}

.companies-layout {
    display: grid;
    grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
    gap: 1.5rem;
    align-items: start;
}

.company-form-card,
.companies-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
}

.company-form-card {
    position: sticky;
    top: calc(var(--header-height) + 1.5rem);
    padding: 1.5rem;
}

.company-form-icon {
    display: grid;
    width: 2.75rem;
    height: 2.75rem;
    margin-bottom: 1rem;
    place-items: center;
    border-radius: .8rem;
    background: rgba(59, 130, 246, .1);
    color: var(--accent);
    font-size: 1.25rem;
}

.company-form-heading h2,
.companies-card-header h2 {
    margin: 0;
    font-size: 1.1rem;
    letter-spacing: -.01em;
}

.company-form-heading p,
.companies-card-header p {
    font-size: .85rem;
}

.company-form {
    margin-top: 1.5rem;
}

.company-field label {
    display: block;
    margin-bottom: .5rem;
    font-size: .85rem;
    font-weight: 600;
}

.company-field input {
    box-sizing: border-box;
    width: 100%;
    padding: .72rem .85rem;
    border: 1px solid var(--input-border);
    border-radius: var(--radius-md);
    outline: none;
    background: var(--input-bg);
    color: var(--input-text);
    font: inherit;
    font-size: .9rem;
    transition: border-color .2s, box-shadow .2s;
}

.company-field input::placeholder {
    color: var(--input-placeholder);
}

.company-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--input-focus-ring);
}

.company-field input[aria-invalid="true"] {
    border-color: #dc2626;
}

.company-toggle {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-top: 1.25rem;
    cursor: pointer;
}

.company-toggle input {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
}

.company-toggle-track {
    position: relative;
    flex: 0 0 auto;
    width: 2.45rem;
    height: 1.4rem;
    border-radius: 99px;
    background: #cbd5e1;
    transition: background .2s;
}

.company-toggle-track::after {
    content: "";
    position: absolute;
    top: .2rem;
    left: .2rem;
    width: 1rem;
    height: 1rem;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 3px rgba(15, 23, 42, .25);
    transition: transform .2s;
}

.company-toggle input:checked + .company-toggle-track {
    background: var(--accent);
}

.company-toggle input:checked + .company-toggle-track::after {
    transform: translateX(1.05rem);
}

.company-toggle input:focus-visible + .company-toggle-track {
    outline: 3px solid var(--input-focus-ring);
    outline-offset: 2px;
}

.company-toggle strong,
.company-toggle small {
    display: block;
}

.company-toggle strong {
    font-size: .85rem;
}

.company-toggle small {
    margin-top: .15rem;
    color: var(--text-secondary);
    font-size: .72rem;
    line-height: 1.35;
}

.company-form-actions {
    display: flex;
    justify-content: flex-end;
    gap: .5rem;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border-light);
}

.company-form-actions .btn {
    margin: 0;
    padding-inline: 1rem;
}

.company-field-errors,
.company-form-errors {
    margin-top: .45rem;
    color: #dc2626;
    font-size: .78rem;
}

.company-field-errors ul,
.company-form-errors ul {
    margin: 0;
    padding-left: 1rem;
}

.companies-card {
    min-width: 0;
    overflow: hidden;
}

.companies-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    padding: 1.35rem 1.5rem;
    border-bottom: 1px solid var(--border-light);
}

.companies-title-line {
    display: flex;
    align-items: center;
    gap: .65rem;
}

.companies-count {
    display: inline-grid;
    min-width: 1.6rem;
    height: 1.6rem;
    padding: 0 .35rem;
    place-items: center;
    border-radius: 99px;
    background: var(--bg-body);
    color: var(--text-secondary);
    font-size: .75rem;
    font-weight: 700;
}

.companies-search {
    position: relative;
    display: block;
    flex: 0 1 270px;
}

.companies-search i {
    position: absolute;
    top: 50%;
    left: .85rem;
    color: var(--text-secondary);
    transform: translateY(-50%);
    pointer-events: none;
}

.companies-search input {
    box-sizing: border-box;
    width: 100%;
    padding: .65rem .8rem .65rem 2.35rem;
    border: 1px solid var(--input-border);
    border-radius: 99px;
    outline: none;
    background: var(--bg-body);
    color: var(--input-text);
    font: inherit;
    font-size: .85rem;
    transition: border-color .2s, box-shadow .2s, background .2s;
}

.companies-search input:focus {
    border-color: var(--accent);
    background: var(--input-bg);
    box-shadow: 0 0 0 3px var(--input-focus-ring);
}

.companies-table-wrap {
    overflow-x: auto;
}

.companies-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .86rem;
}

.companies-table th {
    padding: .75rem 1rem;
    border-bottom: 1px solid var(--border-light);
    background: color-mix(in srgb, var(--bg-body) 65%, var(--bg-card));
    color: var(--text-secondary);
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .045em;
    text-align: right;
    text-transform: uppercase;
    white-space: nowrap;
}

.companies-table th:first-child {
    padding-left: 1.5rem;
    text-align: left;
}

.companies-table td {
    height: 4.25rem;
    padding: .75rem 1rem;
    border-bottom: 1px solid var(--border-light);
    vertical-align: middle;
}

.companies-table tbody tr:last-child td {
    border-bottom: 0;
}

.companies-table tbody tr {
    transition: background .15s;
}

.companies-table tbody tr:hover {
    background: var(--hover-table);
}

.companies-table tr[hidden] {
    display: none;
}

.company-identity-column {
    min-width: 210px;
}

.company-number-column {
    width: 70px;
}

.company-money-column {
    min-width: 110px;
}

.company-action-column {
    width: 90px;
}

.company-identity {
    display: flex;
    align-items: center;
    gap: .75rem;
}

.company-monogram {
    display: grid;
    flex: 0 0 auto;
    width: 2.35rem;
    height: 2.35rem;
    place-items: center;
    border-radius: .7rem;
    background: rgba(59, 130, 246, .1);
    color: var(--accent);
    font-size: .82rem;
    font-weight: 750;
}

.company-name-block,
.company-name-block strong {
    display: block;
}

.company-name-block strong,
.company-name-link {
    max-width: 230px;
    overflow: hidden;
    font-size: .88rem;
    font-weight: 700;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.company-name-link {
    display: block;
    color: var(--text-main);
    text-decoration: none;
}

.company-name-link:hover {
    color: var(--accent);
}

.company-status {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    margin-top: .3rem;
    color: var(--text-secondary);
    font-size: .7rem;
    font-weight: 600;
}

.company-status i {
    width: .42rem;
    height: .42rem;
    border-radius: 50%;
    background: currentColor;
}

.company-status-active {
    color: #16803c;
}

.company-status-inactive {
    color: #94a3b8;
}

.company-number,
.company-money {
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
}

.company-number {
    color: var(--text-secondary);
}

.company-money {
    font-weight: 600;
}

.company-paid {
    color: #16803c;
}

.company-overdue {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    padding: .25rem .45rem;
    border-radius: 99px;
    background: #fef2f2;
    color: #b91c1c;
    font-size: .75rem;
    font-weight: 700;
}

.company-no-overdue {
    color: var(--text-secondary);
}

.company-action {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: .15rem;
    padding-right: 1.5rem !important;
    text-align: right;
}

.company-edit-link {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .45rem .65rem;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    color: var(--text-secondary);
    font-size: .78rem;
    font-weight: 600;
    text-decoration: none;
    transition: color .15s, border-color .15s, background .15s;
}

.company-edit-link:hover {
    border-color: var(--border-light);
    background: var(--bg-card);
    color: var(--accent);
}

.company-view-link {
    color: var(--accent);
}

.company-edit-icon {
    padding-inline: .55rem;
}

.companies-empty {
    padding: 3.5rem 1.5rem !important;
    color: var(--text-secondary);
    text-align: center;
}

.companies-empty i,
.companies-empty strong,
.companies-empty span {
    display: block;
}

.companies-empty i {
    margin-bottom: .75rem;
    font-size: 1.6rem;
}

.companies-empty strong {
    color: var(--text-main);
}

.companies-empty span {
    margin-top: .35rem;
    font-size: .82rem;
}

.companies-search-empty[hidden] {
    display: none;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

[data-theme="dark"] .company-form-icon,
[data-theme="dark"] .company-monogram {
    background: rgba(96, 165, 250, .14);
}

[data-theme="dark"] .company-status-active,
[data-theme="dark"] .company-paid {
    color: #4ade80;
}

[data-theme="dark"] .company-overdue {
    background: rgba(185, 28, 28, .18);
    color: #fca5a5;
}

@media (max-width: 1180px) {
    .companies-layout {
        grid-template-columns: 1fr;
    }

    .company-form-card {
        position: static;
    }

    .company-form {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(210px, .8fr) auto;
        gap: 1rem;
        align-items: end;
        margin-top: 1.25rem;
    }

    .company-toggle,
    .company-form-actions {
        margin-top: 0;
    }

    .company-form-actions {
        padding-top: 0;
        border-top: 0;
    }
}

@media (max-width: 820px) {
    .companies-header,
    .companies-card-header {
        align-items: stretch;
        flex-direction: column;
        gap: 1rem;
    }

    .companies-back-link {
        align-self: flex-start;
    }

    .company-form {
        grid-template-columns: 1fr;
        align-items: stretch;
    }

    .company-form-actions {
        margin-top: .25rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border-light);
    }

    .companies-search {
        flex-basis: auto;
    }
}

@media (max-width: 640px) {
    .companies-header {
        margin-bottom: 1.25rem;
    }

    .companies-card,
    .company-form-card {
        border-radius: var(--radius-lg);
    }

    .companies-card-header,
    .company-form-card {
        padding: 1.15rem;
    }

    .companies-table,
    .companies-table tbody,
    .companies-table tr,
    .companies-table td {
        display: block;
    }

    .companies-table thead {
        display: none;
    }

    .companies-table tbody tr {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        padding: 1rem 1.15rem;
        border-bottom: 1px solid var(--border-light);
    }

    .companies-table tbody tr:last-child {
        border-bottom: 0;
    }

    .companies-table td {
        box-sizing: border-box;
        height: auto;
        padding: .6rem 0;
        border: 0;
        text-align: left;
    }

    .companies-table td:first-child {
        grid-column: 1 / -1;
        padding-top: 0;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-light);
    }

    .companies-table td:not(:first-child):not(.company-action)::before {
        content: attr(data-label);
        display: block;
        margin-bottom: .25rem;
        color: var(--text-secondary);
        font-size: .65rem;
        font-weight: 700;
        letter-spacing: .04em;
        text-transform: uppercase;
    }

    .company-action {
        display: flex !important;
        grid-column: 1 / -1;
        gap: .5rem;
        padding: .75rem 0 0 !important;
    }

    .company-view-link {
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        border-color: var(--border-light);
    }

    .company-edit-icon {
        border-color: var(--border-light);
    }

    .companies-empty {
        grid-column: 1 / -1;
    }
}
</style>
