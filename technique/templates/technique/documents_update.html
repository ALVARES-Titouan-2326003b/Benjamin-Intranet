{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'technique/css/style.css' %}">

<div class="card">
    <h2>Modifier le document</h2>

    <div style="margin-bottom: 1rem;">
        <label style="display:block; font-weight:600; margin-bottom: .35rem;">Fichier actuel</label>
        <a href="{{ document.fichier.url }}" target="_blank">
            {{ document.fichier.name }}
        </a>
        <div style="font-size: .9rem; color: #666; margin-top: .25rem;">
            Le fichier ne peut pas être modifié depuis cet écran.
        </div>
    </div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">
                Enregistrer
            </button>

            <a href="{% url 'technique:documents_detail' document.pk %}"
               class="btn btn-secondary">
               Annuler
            </a>
        </div>
    </form>
</div>
{% endblock %}
