{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Factures</title>
    <link rel="stylesheet" href="{% static 'chatbot/css/chatbot.css' %}">
</head>
<body>
    <div id="chatbot-widget">
        <div id="chatbot-toggle" onclick="toggleChat()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        </div>

        <div id="chatbot-container" class="hidden">
            <div id="chatbot-header">
                <div class="chatbot-header-text">
                    <span>Assistant Factures et Juridique</span>
                    <div class="chatbot-subtitle">Questions immobilières et suivi des factures</div>
                </div>
                <a href="{% url 'chatbot:history' %}"
                   style="color: white; font-size: 0.85rem; text-decoration: underline;">
                    Voir l'historique
                </a>
                <a href="{% url 'chatbot:help' %}"
                   style="color: white; font-size: 0.85rem; text-decoration: underline;">
                    Aide
                </a>
                <button onclick="toggleChat()" id="close-btn">×</button>
            </div>

            <div id="chatbot-messages">
                <div class="message-block bot-block">
                    <div class="bot-message">
                        Bonjour {{ user.username }} ! Je peux vous aider sur :
                        • l'état de vos factures fournisseurs
                        • vos questions juridiques immobilières
                    </div>
                    <div class="message-footer">
                        <span>Assistant</span>
                        <span class="message-time" data-init-time></span>
                    </div>
                </div>
            </div>

            <div id="chatbot-input">
                <input type="text" id="message-input" placeholder="Tapez votre message...">
                <button onclick="sendMessage()" id="send-btn">📤</button>
            </div>
        </div>
    </div>

    <script src="{% static 'chatbot/js/chatbot.js' %}"></script>
</body>
</html>
