{% load static %}
<div id="chatbot-widget">
    <div id="chatbot-toggle" onclick="toggleChat()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
    </div>

    <div id="chatbot-container" class="hidden">
        <div id="chatbot-header">
            <div class="chatbot-header-text">
                <span>Assistant Intranet</span>
                <a href="{% url 'chatbot:history' %}" class="chatbot-history-link">
                    Voir l'historique
                </a>
                <a href="{% url 'chatbot:help' %}" class="chatbot-history-link">
                    Aide
                </a>
            </div>
            <button onclick="toggleChat()" id="close-btn">×</button>
        </div>

        <div id="chatbot-messages">
            <div class="bot-message">
                Bonjour ! Je peux vous aider sur les factures, les documents internes et les questions juridiques immobilières.
            </div>
        </div>

        <div id="chatbot-input">
            <input type="text" id="message-input" placeholder="Tapez votre message...">
            <button onclick="sendMessage()" id="send-btn">📤</button>
        </div>
    </div>
</div>

<link rel="stylesheet" href="{% static 'chatbot/css/chatbot.css' %}">
<script src="{% static 'chatbot/js/chatbot.js' %}"></script>
